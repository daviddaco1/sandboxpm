name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  ci:
    name: Build, Lint, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Docker sandbox assets in sync
        run: pnpm sync-assets:check

      - name: Test
        run: pnpm test

      - name: Coverage
        run: pnpm test:coverage

      - name: E2E (main push only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm test:e2e
